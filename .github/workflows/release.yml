name: Release

# CI-driven release workflow for rustloc.
#
# Triggered via `scripts/release <version|major|minor|patch>` (which calls
# `gh workflow run release.yml -f version=...`). CI does the version bump,
# CHANGELOG roll, commit, tag, GitHub Release, multi-platform build,
# macOS sign+notarize, .deb attach, crates.io publish, and Homebrew
# formula push.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.14.0 or 0.14.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # ─── Project-specific values ──────────────────────────────────────────
  BIN_NAME: rustloc
  CRATE_NAME: rustloc
  EXTRA_CRATES: "rustloclib"
  PUBLISH_WAIT_SECONDS: "30"
  # ─── Homebrew tap ─────────────────────────────────────────────────────
  HOMEBREW_TAP: arthur-debert/homebrew-tools
  HOMEBREW_FORMULA: rustloc
  # ─── Debian/Ubuntu packages ───────────────────────────────────────────
  ENABLE_DEB: "true"

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      release-sha: ${{ steps.bump.outputs.sha }}
      prerelease: ${{ steps.bump.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Validate and prepare
        id: bump
        env:
          NEW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          if ! [[ "$NEW_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH[-PRERELEASE] (got: $NEW_VERSION)"
            exit 1
          fi

          IS_PRERELEASE=false
          if [[ "$NEW_VERSION" == *-* ]]; then
            IS_PRERELEASE=true
          fi
          echo "prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"

          TAG="v$NEW_VERSION"
          # rustloc uses [workspace.package] version + version.workspace=true
          # in each crate, so the workspace toml is the single source of truth.
          CURRENT_VERSION=$(grep -E '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')

          git fetch --tags origin >/dev/null 2>&1 || true

          # Resume case: tag already exists and Cargo.toml at that commit
          # is at NEW_VERSION. Skip bump; downstream jobs re-run against
          # the tagged commit. See dodot/padz/simple-gal for the same logic.
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-list -n 1 "$TAG")
            TAG_VERSION=$(git show "$TAG_SHA:Cargo.toml" | grep -E '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/')
            if [ "$TAG_VERSION" = "$NEW_VERSION" ]; then
              echo "tag $TAG already exists at $TAG_SHA (Cargo.toml=$TAG_VERSION) — resuming release"
              echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
              echo "sha=$TAG_SHA" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error::tag $TAG exists but Cargo.toml at that commit is $TAG_VERSION, not $NEW_VERSION"
            exit 1
          fi

          OLD_VERSION="$CURRENT_VERSION"
          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "::error::Cargo.toml is already at $NEW_VERSION (but no tag)"
            exit 1
          fi

          # Read content under ## [Unreleased].
          BODY=$(awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md)
          if [ -z "$(echo "$BODY" | tr -d '[:space:]')" ]; then
            echo "::error::CHANGELOG.md has no entries under ## [Unreleased]"
            exit 1
          fi

          echo "Releasing $OLD_VERSION → $NEW_VERSION"

          # Bump workspace.package version (single source of truth) AND
          # the intra-workspace dep pin in [workspace.dependencies]. Both
          # live in the workspace Cargo.toml; the sed patterns are
          # line-anchored so they don't accidentally match dependency
          # version strings of unrelated packages.
          sed -i -E "s/^version = \"$OLD_VERSION\"/version = \"$NEW_VERSION\"/" Cargo.toml
          sed -i -E "s|^rustloclib = \\{ path = \"rustloclib\", version = \"$OLD_VERSION\"|rustloclib = { path = \"rustloclib\", version = \"$NEW_VERSION\"|" Cargo.toml
          cargo update -p rustloc -p rustloclib

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$IS_PRERELEASE" = "true" ]; then
            git add Cargo.toml Cargo.lock
            git commit -m "chore: Release $TAG"
          else
            TODAY=$(date -u +%Y-%m-%d)
            awk -v ver="$NEW_VERSION" -v today="$TODAY" '
              !done && /^## \[Unreleased\]/ {
                print
                print ""
                print "## [" ver "] - " today
                done=1
                next
              }
              { print }
            ' CHANGELOG.md > CHANGELOG.md.tmp
            mv CHANGELOG.md.tmp CHANGELOG.md
            git add Cargo.toml Cargo.lock CHANGELOG.md
            git commit -m "chore: Release $TAG"
          fi
          git tag -a "$TAG" -m "Release $TAG"
          git push origin main
          git push origin "$TAG"

          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  create-release:
    needs: prepare-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Extract release notes from CHANGELOG
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
          PRERELEASE: ${{ needs.prepare-release.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            awk '/^## \[Unreleased\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          else
            awk '/^## \['"$VERSION"'\]/{found=1; next} /^## \[/{if(found) exit} found{print}' CHANGELOG.md > release-notes.md
          fi
          if [ ! -s release-notes.md ]; then
            echo "Release v$VERSION" > release-notes.md
          fi
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare-release.outputs.version }}
          name: v${{ needs.prepare-release.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ needs.prepare-release.outputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    needs: [prepare-release, create-release]
    if: always() && !failure() && !cancelled()
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: rustloc-aarch64-apple-darwin
            cross: false
            sign: true
            deb_arch: ""
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: rustloc-x86_64-apple-darwin
            cross: false
            sign: true
            deb_arch: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustloc-x86_64-linux-gnu
            cross: false
            sign: false
            deb_arch: amd64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: rustloc-aarch64-linux-gnu
            # cross's default docker image fails on serde build.rs
            # (glibc/toolchain mismatch in the older base image — same
            # flake lex-fmt/lex hit). Reverted from cross to apt-installed
            # `gcc-aarch64-linux-gnu` + CARGO_TARGET_*_LINKER env, which
            # works for projects without complex C-dep cross compile.
            cross: false
            sign: false
            deb_arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools (Linux ARM)
        if: matrix.target == 'aarch64-unknown-linux-gnu' && !matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross
        if: matrix.cross
        # `command -v` guard skips reinstall when cross was restored
        # from actions/cache. Without it, `cargo install` fails the
        # second build with "binary already exists in destination".
        run: command -v cross >/dev/null 2>&1 || cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        id: build
        env:
          # When matrix.cross=false on aarch64-linux, we use apt-installed
          # gcc-aarch64-linux-gnu as the linker (set up by the previous
          # step). cargo reads this env var to find the correct linker.
          # No-op for other targets / cross builds.
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          else
            cargo build --release --target "${{ matrix.target }}" -p "$CRATE_NAME"
          fi

      # ─── macOS code signing + notarization (matrix.sign == true) ──────
      - name: Import signing certificate
        id: import-cert
        if: matrix.sign
        continue-on-error: true
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -z "$APPLE_CERTIFICATE_P12_BASE64" ] || [ -z "$APPLE_CERTIFICATE_PASSWORD" ]; then
            echo "::warning::No signing certificate configured, skipping code signing"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security set-keychain-settings -lut 3600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "signed=true" >> "$GITHUB_OUTPUT"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Sign binary
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        run: |
          codesign --sign "$CODESIGN_IDENTITY" --options runtime \
            target/${{ matrix.target }}/release/${{ env.BIN_NAME }}
          codesign --verify --deep --strict target/${{ matrix.target }}/release/${{ env.BIN_NAME }}

      - name: Write App Store Connect API key
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then
            echo "::warning::No ASC API key configured, skipping notarization"
            exit 0
          fi
          echo "$ASC_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"

      - name: Submit for notarization
        id: notarize-submit
        if: matrix.sign && steps.import-cert.outputs.signed == 'true'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          if [ -z "$ASC_API_KEY_BASE64" ]; then exit 0; fi
          cd target/${{ matrix.target }}/release
          zip "${BIN_NAME}-notarize.zip" "$BIN_NAME"
          RESULT=$(xcrun notarytool submit "${BIN_NAME}-notarize.zip" \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "${{ secrets.ASC_API_KEY_ID }}" \
            --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
            --output-format json \
            --no-wait)
          ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "submission-id=$ID" >> "$GITHUB_OUTPUT"
          rm "${BIN_NAME}-notarize.zip"

      - name: Wait for notarization
        if: matrix.sign && steps.notarize-submit.outputs.submission-id
        run: |
          ID="${{ steps.notarize-submit.outputs.submission-id }}"
          for i in $(seq 1 60); do
            RESULT=$(xcrun notarytool info "$ID" \
              --key "$RUNNER_TEMP/AuthKey.p8" \
              --key-id "${{ secrets.ASC_API_KEY_ID }}" \
              --issuer "${{ secrets.ASC_API_ISSUER_ID }}" \
              --output-format json 2>&1) || true
            STATUS=$(echo "$RESULT" | python3 -c \
              "import sys,json; print(json.load(sys.stdin).get('status','Unknown'))" \
              2>/dev/null || echo "Unknown")
            echo "  [$i/60] status=$STATUS ($(date -u +%H:%M:%S))"
            if [ "$STATUS" = "Accepted" ]; then exit 0; fi
            if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
              xcrun notarytool log "$ID" \
                --key "$RUNNER_TEMP/AuthKey.p8" \
                --key-id "${{ secrets.ASC_API_KEY_ID }}" \
                --issuer "${{ secrets.ASC_API_ISSUER_ID }}" 2>&1 || true
              exit 1
            fi
            sleep 30
          done
          echo "::warning::Notarization timed out after 30 min. Binary is signed but not notarized."

      # Canonical packaging: subdirectory layout (matches dodot, padz).
      # `tar -xzf rustloc-<target>.tar.gz` produces rustloc-<target>/rustloc.
      - name: Package binary
        run: |
          ARTIFACT="${{ matrix.artifact }}"
          mkdir -p "dist/$ARTIFACT"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/$ARTIFACT/"
          for f in README.md CHANGELOG.md; do
            [ -f "$f" ] && cp "$f" "dist/$ARTIFACT/"
          done
          find . -maxdepth 1 -type f \
            \( -iname 'LICENSE*' -o -iname 'COPYING*' -o -iname 'NOTICE*' \) \
            -exec cp {} "dist/$ARTIFACT/" \;
          cd dist
          tar -czvf "../${ARTIFACT}.tar.gz" "$ARTIFACT"

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare-release.outputs.version }}"
          gh release upload "$TAG" "${{ matrix.artifact }}.tar.gz" --clobber

      - name: Upload tarball as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz
          if-no-files-found: error
          retention-days: 7

      # ─── Debian package (linux targets only, gated on ENABLE_DEB) ────
      - name: Install cargo-deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true' && steps.build.outcome == 'success'
        run: command -v cargo-deb >/dev/null 2>&1 || cargo install cargo-deb --locked

      - name: Build .deb package
        id: deb
        if: matrix.deb_arch != '' && env.ENABLE_DEB == 'true' && steps.build.outcome == 'success'
        run: |
          cargo deb -p rustloc \
            --target ${{ matrix.target }} \
            --no-build \
            --no-strip

      - name: Upload .deb to GitHub Release
        if: always() && !cancelled() && steps.deb.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.prepare-release.outputs.version }}"
          DEB=$(ls target/${{ matrix.target }}/debian/*.deb | head -1)
          if [ -z "$DEB" ]; then
            echo "::error::No .deb found at target/${{ matrix.target }}/debian/"
            exit 1
          fi
          gh release upload "$TAG" "$DEB" --clobber

      - name: Upload .deb as workflow artifact
        if: always() && !cancelled() && steps.deb.outcome == 'success'
        uses: actions/upload-artifact@v7
        with:
          name: rustloc-${{ matrix.deb_arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error
          retention-days: 7

  publish-crates:
    needs: [prepare-release, create-release]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      # Use scripts/ci-publish-crate.sh for the robust two-tier check:
      # 1. Pre-check via crates.io JSON API (skips re-publish entirely)
      # 2. Grep cargo's publish output for "already exists"/"already uploaded"
      # The prior `cargo search VERSION grep` heuristic was broken for
      # re-running an older rc — `cargo search` returns only the LATEST
      # version, so the grep wouldn't match older ones.
      #
      # NB: secret name is CRATES_IO_KEY (matches dodot/padz/simple-gal
      # convention). The pre-port workflow used CRATES_IO_TOKEN which
      # didn't exist as a secret — so all CI publishes silently skipped
      # via the check_token gate. cargo natively reads CARGO_REGISTRY_TOKEN,
      # so use that env var name.
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
        run: |
          for crate in $EXTRA_CRATES; do
            scripts/ci-publish-crate.sh "$crate"
            echo "Waiting ${PUBLISH_WAIT_SECONDS}s for crates.io index..."
            sleep "$PUBLISH_WAIT_SECONDS"
          done
          scripts/ci-publish-crate.sh "$CRATE_NAME"

  homebrew-formula:
    needs: [prepare-release, build-binaries]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Check tap token
        id: guard
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not configured — skipping formula update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for template + Cargo.toml)
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-release.outputs.release-sha }}

      - name: Install Rust (for cargo metadata)
        if: steps.guard.outputs.skip != 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Download release tarballs
        if: steps.guard.outputs.skip != 'true'
        uses: actions/download-artifact@v5
        with:
          pattern: ${{ env.BIN_NAME }}-*
          merge-multiple: true

      - name: Gather values for formula
        id: values
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail

          CLASS_NAME=$(echo "$HOMEBREW_FORMULA" | awk -F'[-_]' '{
            for(i=1;i<=NF;i++) printf "%s", toupper(substr($i,1,1)) tolower(substr($i,2))
          }')

          PKG_META=$(cargo metadata --no-deps --format-version=1 \
            | jq -cer --arg c "$CRATE_NAME" '.packages[] | select(.name==$c)')
          DESC=$(echo     "$PKG_META" | jq -r '.description // ""')
          LICENSE=$(echo  "$PKG_META" | jq -r '.license // ""')
          HOMEPAGE=$(echo "$PKG_META" | jq -r '.homepage // .repository // ""')

          die_if_empty() {
            local name="$1" value="$2" fix="$3"
            if [ -z "$value" ]; then
              echo "::error::Missing $name for crate '$CRATE_NAME'. $fix"
              exit 1
            fi
          }
          die_if_empty description "$DESC"     "Set package.description in Cargo.toml."
          die_if_empty license     "$LICENSE"  "Set package.license in Cargo.toml."
          die_if_empty homepage    "$HOMEPAGE" "Set package.homepage or package.repository in Cargo.toml."

          URL_BASE="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/${BIN_NAME}"

          sha_for() { sha256sum "${BIN_NAME}-$1.tar.gz" | cut -d' ' -f1; }

          {
            echo "class_name=$CLASS_NAME"
            echo "desc=$DESC"
            echo "license=$LICENSE"
            echo "homepage=$HOMEPAGE"
            echo "url_aarch64_apple_darwin=${URL_BASE}-aarch64-apple-darwin.tar.gz"
            echo "url_x86_64_apple_darwin=${URL_BASE}-x86_64-apple-darwin.tar.gz"
            echo "url_x86_64_linux_gnu=${URL_BASE}-x86_64-linux-gnu.tar.gz"
            echo "url_aarch64_linux_gnu=${URL_BASE}-aarch64-linux-gnu.tar.gz"
            echo "sha_aarch64_apple_darwin=$(sha_for aarch64-apple-darwin)"
            echo "sha_x86_64_apple_darwin=$(sha_for  x86_64-apple-darwin)"
            echo "sha_x86_64_linux_gnu=$(sha_for     x86_64-linux-gnu)"
            echo "sha_aarch64_linux_gnu=$(sha_for    aarch64-linux-gnu)"
          } >> "$GITHUB_OUTPUT"

      - name: Render Homebrew formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION:                   ${{ needs.prepare-release.outputs.version }}
          CLASS_NAME:                ${{ steps.values.outputs.class_name }}
          DESC:                      ${{ steps.values.outputs.desc }}
          LICENSE:                   ${{ steps.values.outputs.license }}
          HOMEPAGE:                  ${{ steps.values.outputs.homepage }}
          URL_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.url_aarch64_apple_darwin }}
          URL_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.url_x86_64_apple_darwin }}
          URL_X86_64_LINUX_GNU:      ${{ steps.values.outputs.url_x86_64_linux_gnu }}
          URL_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.url_aarch64_linux_gnu }}
          SHA_AARCH64_APPLE_DARWIN:  ${{ steps.values.outputs.sha_aarch64_apple_darwin }}
          SHA_X86_64_APPLE_DARWIN:   ${{ steps.values.outputs.sha_x86_64_apple_darwin }}
          SHA_X86_64_LINUX_GNU:      ${{ steps.values.outputs.sha_x86_64_linux_gnu }}
          SHA_AARCH64_LINUX_GNU:     ${{ steps.values.outputs.sha_aarch64_linux_gnu }}
        run: |
          set -euo pipefail
          mkdir -p out
          python3 .github/render-homebrew-formula.py \
            .github/homebrew-formula.rb.tmpl \
            "out/${HOMEBREW_FORMULA}.rb"

          echo "=== Generated formula ==="
          cat "out/${HOMEBREW_FORMULA}.rb"

      - name: Ruby syntax check
        if: steps.guard.outputs.skip != 'true'
        run: ruby -c "out/${HOMEBREW_FORMULA}.rb"

      - name: Checkout tap repo
        if: steps.guard.outputs.skip != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.HOMEBREW_TAP }}
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Commit and push formula
        if: steps.guard.outputs.skip != 'true'
        env:
          VERSION: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p tap/Formula
          cp "out/${HOMEBREW_FORMULA}.rb" "tap/Formula/${HOMEBREW_FORMULA}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "Formula/${HOMEBREW_FORMULA}.rb"
          if git diff --cached --quiet; then
            echo "Formula unchanged — nothing to push."
            exit 0
          fi
          git commit -m "${HOMEBREW_FORMULA} ${VERSION}"
          git push
