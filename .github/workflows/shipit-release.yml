name: shipit-release

# rustloc's shipit release caller (ADP02-WS08, the rust fleet cutover â€”
# arthur-debert/shipit#841) â€” the WS09 BLESSED per-stage dispatch shape
# (ADR-0054, workflows.lex Â§8), copied from arthur-debert/standout's
# pathfinder caller (#187): one workflow_dispatch caller with a `stage`
# choice (full | prepare | build | sign | publish), one job per stage,
# each a single `uses:` line against the matching block, gated
# `if: inputs.stage == '...'`, forwarding
# `version`/`tag`/`run-id`/`unsigned` verbatim. Routing ONLY (ADR-0040):
# the release plan â€” matrix, live stages, the post-RC-guard endpoint set,
# required secrets â€” is preflight's, computed inside the blocks; nothing
# is re-derived or wired stage-to-stage here.
#
# Every ref is the FULL remote `arthur-debert/shipit/...@v1` form â€” never
# `./` relative (which would resolve against THIS repo, where no blocks
# live), never SHA-pinned (the fleet rides the advance-major-moved `v1`,
# ADR-0010).
#
# rustloc's release surface (.shipit.toml [artifacts]) is the signed-darwin
# binary shape: [artifacts.rustloc] archives darwin-arm64 +
# linux-x86_64/arm64 with `sign = true` (the archive-leg raw-binary
# codesign+notarize, shipit#800) into gh-release + crates (rustloclib then
# rustloc, topo-derived) + brew, and [artifacts.rustloc-deb] attaches the
# two linux .debs â€” the legacy rust-cli.yml@v3 5-asset parity set. The
# plan has real build AND sign stages, so every `stage` choice here
# dispatches live work.
#
# Secrets â€” the UNIFORM plan-required set on every secret-taking stage
# job (shipit#896): preflight re-validates the WHOLE release plan at
# every stage entry, so `full`, `prepare`, `sign` and `publish` all
# forward the SAME set â€” narrowing a stage to "the secrets its own steps
# consume" fails that stage's preflight on the rest of the plan.
# (`build` takes no secrets block: its called workflow declares none.)
#   RELEASE_TOKEN         prepare's tag+branch push through the ruleset
#                         (a GITHUB_TOKEN push would not re-trigger
#                         workflows).
#   CARGO_REGISTRY_TOKEN  the crates endpoint's registry token, mapped
#                         from this repo's legacy-named CRATES_IO_KEY
#                         secret (NOT renamed: the legacy release.yml
#                         still consumes it under that name until the
#                         post-rc-proof retirement). The RC guard drops
#                         the crates endpoint on an -release-rc version
#                         centrally.
#   HOMEBREW_TAP_TOKEN    the brew endpoint's tap push
#                         (arthur-debert/homebrew-tools carries
#                         rustloc.rb today).
#   The mac sign set:
#     APPLE_CERTIFICATE            mapped from this repo's legacy-named
#                                  APPLE_CERTIFICATE_P12_BASE64 secret
#                                  (NOT renamed, same rationale as
#                                  CRATES_IO_KEY).
#     APPLE_CERTIFICATE_PASSWORD   verbatim name.
#     ASC_API_KEY_BASE64 /         the ASC notary trio, verbatim names
#     ASC_API_KEY_ID /             (the Apple-ID trio alternative is not
#     ASC_API_ISSUER_ID            provisioned on this repo).
# gh-release rides the workflow's own GITHUB_TOKEN (no registry entry).

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          The release version, consumed by `full`/`prepare`: a bare semver
          (1.0.0, 1.0.0-release-rc) or a bump word (major|minor|patch).
          Ignored by the tag-dispatched stages.
        required: false
        type: string
      stage:
        description: >-
          What to dispatch: the full composed chain (default) or ONE
          independently re-runnable stage block (per-stage dispatch,
          ADR-0054). `prepare` dispatches on `version`; `build`, `sign`
          and `publish` on `tag` (+ `run-id` for the artifact-consuming
          stages).
        required: false
        type: choice
        default: full
        options:
          - full
          - prepare
          - build
          - sign
          - publish
      tag:
        description: >-
          The release tag (v<version>), consumed by the `build`/`sign`/
          `publish` stage dispatches (ADR-0041: the version is read off
          the tag). Ignored by `full`/`prepare`.
        required: false
        type: string
      run-id:
        description: >-
          The SOURCE run id whose artifacts feed an artifact-consuming
          stage dispatch (`sign`, `publish`) â€” one source run per dispatch
          (workflows.lex Â§8). Ignored by the other stages.
        required: false
        type: string
      unsigned:
        description: >-
          Break-glass: flip a signing plan to the unsigned path. Forwarded
          verbatim; rustloc's plan HAS a sign stage (darwin `sign = true`),
          so this genuinely skips the codesign+notarize leg â€” recorded,
          break-glass only.
        required: false
        type: boolean
        default: false

# The standalone dispatch caller's grant (workflows.lex Â§8): `contents:
# write` for prepare's push and publish's gh-release, `actions: read` for
# the cross-run artifact downloads (`run-id` flips download-artifact onto
# the REST API). The downloading blocks deliberately declare NO
# `permissions:` key â€” a called workflow can only downgrade this token.
permissions:
  contents: write
  actions: read

jobs:
  release:
    if: inputs.stage == 'full'
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}

  prepare:
    if: inputs.stage == 'prepare'
    uses: arthur-debert/shipit/.github/workflows/wf-prepare.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}

  build:
    if: inputs.stage == 'build'
    uses: arthur-debert/shipit/.github/workflows/wf-build.yml@v1
    with:
      tag: ${{ inputs.tag }}

  sign:
    if: inputs.stage == 'sign'
    uses: arthur-debert/shipit/.github/workflows/wf-sign-mac.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}

  publish:
    if: inputs.stage == 'publish'
    uses: arthur-debert/shipit/.github/workflows/wf-publish.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_KEY }}
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
      ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
