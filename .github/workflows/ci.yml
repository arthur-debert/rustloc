name: CI

# Thin caller for the canonical reusable Rust CI workflow at
# arthur-debert/release. Replaces the previously hand-rolled
# setup-rust + Swatinem cache + fmt/clippy/test sequence and the
# multi-OS matrix that lived here.
#
# See docs/per-stack/rust-ci.md in arthur-debert/release for the
# full input reference. dodot is the reference adopter.
#
# `binary-name: rustloc` causes the check job to build and upload
# `rustloc-linux` (the workspace package name and the produced
# binary file match — see Cargo.toml). No bats e2e suite here.
#
# NOTE: the previous hand-rolled ci.yml ran a cross-OS matrix
# (ubuntu/macos/windows) and per-target release builds. PR-time
# matrix coverage is intentionally NOT part of rust-ci.yml — the
# fleet convention is one Linux runner at PR time, full
# cross-platform validation at release time via rust-cli.yml.
# If multi-OS PR coverage is needed it should be a separate job.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: arthur-debert/release/.github/workflows/rust-ci.yml@take-iii
    with:
      binary-name: rustloc
