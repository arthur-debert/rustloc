name: CI

# Thin caller for the canonical reusable Rust CI workflow at
# arthur-debert/release. Replaces the previously hand-rolled
# rust-toolchain + cargo cache + nextest + multi-platform matrix
# pipeline.
#
# See docs/per-stack/rust-ci.md in arthur-debert/release for the
# full input reference. dodot is the reference adopter of this
# workflow; rustloc joins padz/burgertocow/clapfig.
#
# No `fetch-depth: 0` — the integration tests now build a hermetic
# tempdir git repo for every diff-command test (see
# `fixture_repo()` in rustloc/tests/cli_integration.rs), so the
# default shallow checkout (fetch-depth: 1) is sufficient.

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: arthur-debert/release/.github/workflows/rust-ci.yml@v2
    with:
      binary-name: rustloc
