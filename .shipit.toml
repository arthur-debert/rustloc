# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint].ignore — paths the managed lint gate must SKIP. Seeded with common
# generated/assembled files (a built CHANGELOG, package lockfiles) that are not
# hand-written prose, so a freshly-onboarded repo does not take a latent gate
# failure on them. Gitignore-style globs. You OWN this list and may extend it —
# it is reconcile-safe: `shipit install` seeds [lint] only when absent and never
# clobbers a table you have edited.
[lint]
ignore = [
  "CHANGELOG.md",
  "CHANGELOG/**",
  "package-lock.json",
  "pnpm-lock.yaml",
]

# [lanes] — the declared PR-time check units (ADP02-WS05, #104). The lane
# planner (`shipit ci plan`) maps these + the CI event + a path-diff to the job
# matrix the wf-checks workflow block runs (`pixi run --locked <run>` per job).
# Modeled on lex#829; both lanes' tasks SELF-PROVISION, because on a hosted
# runner nothing outside pixi is provisioned:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists) resolves into the pixi lint env, where the
#     managed toolchain lives — see its definition in pixi.toml
#     [feature.lint.tasks]. Unlike the lex model, no lexd provisioning: this
#     repo tracks zero .lex files, so `shipit lint` has no lex leg here.
#   - `test` IS the managed task (`./bin/shipit test` → `cargo nextest run`):
#     this repo has no submodules or fixture prep to provision inline, so no
#     `test-full` wrapper is needed; rust + cargo-nextest + uv (for bin/shipit)
#     ride pixi's default env ([dependencies] in pixi.toml).
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test"
required = true
local = true

[toolchains]
"." = "rust"

# [artifacts] — rustloc's declared Artifact set for the shipit release
# pipeline (ADP02-WS08, arthur-debert/shipit#841; modeled on
# arthur-debert/padz's ADP02-WS06 map — the proven consumer with this exact
# asset shape). The legacy surface it replaces is release.yml →
# rust-cli.yml@v3 (`crates: rustloclib,rustloc`, `bin-name: rustloc`,
# defaults: darwin arm64 + linux gnu x86_64/aarch64, brew, apt) — which
# stays UNTOUCHED until this repo's rc proof (removal is a later
# coordinator-driven step). Together the two artifacts produce the LEGACY
# ASSET PARITY set:
#   rustloc-aarch64-apple-darwin.tar.gz
#   rustloc-aarch64-unknown-linux-gnu.tar.gz
#   rustloc-x86_64-unknown-linux-gnu.tar.gz
#   rustloc_<v>-1_amd64.deb / rustloc_<v>-1_arm64.deb
#   - [artifacts.rustloc] is the binary-tarball artifact (the brew formula
#     subject): archive composition over the same three native-runner
#     platforms the legacy matrix built, distributed to gh-release + crates
#     (rustloclib then rustloc — shipit derives the workspace topo order
#     itself) + brew (the tap is shipit's portfolio constant,
#     arthur-debert/homebrew-tools, which carries rustloc.rb today — same
#     as legacy). UNLIKE padz, `sign = true`: this repo signs darwin — the
#     archive-leg raw-binary codesign+notarize (arthur-debert/shipit#800)
#     routes the darwin leg through the mac signer, and preflight derives
#     the Apple cert pair + notary-trio secret requirement from the bare
#     flag.
#   - [artifacts.rustloc-deb] is the legacy `apt: true` leg: cargo-deb
#     against the pre-built release binary, linux platforms only,
#     gh-release only (legacy attached the .debs to the GH release; there
#     is no apt repository endpoint).
[artifacts.rustloc]
build = [{ toolchain = "rust", package = "rustloc" }]
platforms = ["darwin-arm64", "linux-x86_64", "linux-arm64"]
bundle = { composition = "archive" }
sign = true
endpoints = ["gh-release", "crates", "brew"]

[artifacts.rustloc-deb]
build = [{ toolchain = "rust", package = "rustloc" }]
platforms = ["linux-x86_64", "linux-arm64"]
bundle = { composition = "deb" }
endpoints = ["gh-release"]

