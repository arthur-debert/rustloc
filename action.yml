name: rustloc-diff
description: Run rustloc on a pull request diff and post the result as a sticky PR comment.
author: arthur-debert
branding:
  icon: bar-chart-2
  color: orange

inputs:
  version:
    description: rustloc version to install (e.g. 0.16.0), or 'latest'.
    default: latest
    required: false
  base:
    description: Base git ref to diff from. Defaults to the PR base SHA.
    default: ${{ github.event.pull_request.base.sha }}
    required: false
  head:
    description: Head git ref to diff to. Defaults to the PR head SHA.
    default: ${{ github.event.pull_request.head.sha }}
    required: false
  args:
    description: Extra args passed to `rustloc diff` (e.g. "--by-file -t code,tests").
    default: --by-file
    required: false
  comment:
    description: Post (and update on subsequent runs) a sticky comment on the PR.
    default: 'true'
    required: false
  github-token:
    description: "Token used to post the PR comment. Needs `pull-requests: write`."
    default: ${{ github.token }}
    required: false

outputs:
  body:
    description: The full markdown body that was (or would be) posted to the PR.
    value: ${{ steps.run.outputs.body }}

runs:
  using: composite
  steps:
    - name: Install rustloc
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        case "${{ runner.os }}-${{ runner.arch }}" in
          Linux-X64)   triple=x86_64-unknown-linux-gnu ;;
          Linux-ARM64) triple=aarch64-unknown-linux-gnu ;;
          macOS-ARM64) triple=aarch64-apple-darwin ;;
          *)
            echo "rustloc-diff: unsupported runner ${{ runner.os }}-${{ runner.arch }}" >&2
            exit 1
            ;;
        esac
        if [ "$VERSION" = "latest" ]; then
          url="https://github.com/arthur-debert/rustloc/releases/latest/download/rustloc-${triple}.tar.gz"
        else
          ver="${VERSION#v}"
          url="https://github.com/arthur-debert/rustloc/releases/download/v${ver}/rustloc-${triple}.tar.gz"
        fi
        echo "rustloc-diff: downloading $url"
        curl -sSfL "$url" -o "$RUNNER_TEMP/rustloc.tgz"
        tar xzf "$RUNNER_TEMP/rustloc.tgz" -C "$RUNNER_TEMP"
        echo "$RUNNER_TEMP/rustloc-${triple}" >> "$GITHUB_PATH"

    - name: Ensure refs are reachable
      shell: bash
      env:
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
      run: |
        set -euo pipefail
        if [ -z "${BASE}" ] || [ -z "${HEAD}" ]; then
          echo "rustloc-diff: base and head inputs are required (no PR context detected)" >&2
          exit 1
        fi
        git fetch --no-tags --depth=1 origin "$BASE" 2>/dev/null || true
        git fetch --no-tags --depth=1 origin "$HEAD" 2>/dev/null || true
        if ! git merge-base "$BASE" "$HEAD" >/dev/null 2>&1; then
          git fetch --no-tags --unshallow origin 2>/dev/null \
            || git fetch --no-tags --deepen=200 origin 2>/dev/null \
            || true
        fi
        # Final verification — if either ref is still unreachable, exit with
        # an actionable message instead of letting `rustloc diff` fail later
        # with a less helpful one.
        missing=
        git rev-parse --verify --quiet "${BASE}^{commit}" >/dev/null || missing="$missing base ($BASE)"
        git rev-parse --verify --quiet "${HEAD}^{commit}" >/dev/null || missing="$missing head ($HEAD)"
        if [ -n "$missing" ] || ! git merge-base "$BASE" "$HEAD" >/dev/null 2>&1; then
          echo "rustloc-diff: cannot reach${missing:- merge-base of $BASE...$HEAD} from the local clone." >&2
          echo "rustloc-diff: use \`actions/checkout@v4\` with \`fetch-depth: 0\` so both refs are present." >&2
          exit 1
        fi

    - name: Run rustloc diff
      id: run
      shell: bash
      env:
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
        EXTRA: ${{ inputs.args }}
        NO_COLOR: '1'
      run: |
        set -euo pipefail
        # shellcheck disable=SC2086
        out="$(rustloc diff "$BASE...$HEAD" $EXTRA --output text)"
        {
          echo 'body<<RUSTLOC_EOF'
          echo '<!-- rustloc-diff -->'
          echo '### rustloc diff'
          echo ''
          echo '```'
          echo "$out"
          echo '```'
          echo ''
          echo "_Generated by [rustloc-diff](https://github.com/arthur-debert/rustloc) on \`${BASE}...${HEAD}\`._"
          echo 'RUSTLOC_EOF'
        } >> "$GITHUB_OUTPUT"
        echo "$out"

    - name: Post or update PR comment
      if: ${{ inputs.comment == 'true' && github.event.pull_request.number != null }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPO: ${{ github.repository }}
        PR: ${{ github.event.pull_request.number }}
        BODY: ${{ steps.run.outputs.body }}
      run: |
        set -euo pipefail
        marker='<!-- rustloc-diff -->'
        # Capture all matching ids first, then take the first line in shell —
        # avoids `gh ... | head` getting SIGPIPE'd under `set -o pipefail`.
        matches=$(gh api -X GET "repos/$REPO/issues/$PR/comments" --paginate \
          --jq ".[] | select(.body | startswith(\"$marker\")) | .id")
        existing=${matches%%$'\n'*}
        if [ -n "$existing" ]; then
          gh api -X PATCH "repos/$REPO/issues/comments/$existing" \
            -f body="$BODY" >/dev/null
          echo "rustloc-diff: updated comment $existing"
        else
          gh api -X POST "repos/$REPO/issues/$PR/comments" \
            -f body="$BODY" >/dev/null
          echo "rustloc-diff: created new comment"
        fi
